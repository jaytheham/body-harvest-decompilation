<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Harvest Decompilation Progress</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --matched: #238636;
      --matched-light: #2ea043;
      --nonmatch: #9e6a03;
      --nonmatch-light: #d29922;
      --asm: #3d444d;
      --accent: #1f6feb;
      --accent-light: #388bfd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    a { color: var(--accent-light); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .subtitle { color: var(--text-muted); font-size: 13px; }
    .header-links { margin-left: auto; display: flex; gap: 12px; font-size: 13px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Hero */
    .hero {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
    }
    .stat-card .label { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: 700; line-height: 1; }
    .stat-card .sub { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
    .stat-card.matched .value { color: var(--matched-light); }
    .stat-card.decomp .value { color: var(--nonmatch-light); }

    /* Progress bar */
    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .progress-section h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .progress-bar {
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--asm);
      display: flex;
    }
    .bar-matched { background: var(--matched-light); transition: width 0.5s ease; }
    .bar-nonmatch { background: var(--nonmatch-light); transition: width 0.5s ease; }
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* Grid: chart + segments */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
    }
    .panel h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }

    /* Segment bars */
    .seg-row { margin-bottom: 14px; }
    .seg-header { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
    .seg-name { color: var(--text); }
    .seg-pct { color: var(--text-muted); font-size: 12px; }
    .seg-bar { height: 8px; border-radius: 4px; background: var(--asm); display: flex; overflow: hidden; }
    .seg-bar .bar-matched { background: var(--matched-light); }
    .seg-bar .bar-nonmatch { background: var(--nonmatch-light); }

    /* Chart */
    .chart-wrap { position: relative; height: 240px; }

    /* Files table */
    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .table-section h2 { font-size: 14px; font-weight: 600; padding: 16px 20px 0; }
    .table-controls {
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .table-controls input, .table-controls select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--accent-light); }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td { padding: 8px 12px; vertical-align: middle; }
    .mini-bar {
      width: 80px; height: 6px; background: var(--asm);
      border-radius: 3px; display: inline-flex; overflow: hidden; vertical-align: middle; margin-left: 6px;
    }
    .mini-bar .bar-matched { background: var(--matched-light); }
    .mini-bar .bar-nonmatch { background: var(--nonmatch-light); }
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-matched { background: rgba(46,160,67,0.15); color: var(--matched-light); }
    .badge-nonmatch { background: rgba(210,153,34,0.15); color: var(--nonmatch-light); }
    .badge-asm { background: rgba(61,68,77,0.4); color: var(--text-muted); }

    /* Contributors */
    .contrib-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .contrib-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }
    .contrib-name { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
    .contrib-stat { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    .contrib-stat span { color: var(--text); }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
    }

    .loading { color: var(--text-muted); padding: 40px; text-align: center; }
    .error { color: #f85149; padding: 20px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Body Harvest Decompilation</h1>
    <div class="subtitle">N64 &mdash; US version</div>
  </div>
  <div class="header-links">
    <a href="https://github.com/jaytheham/body-harvest-decompilation" target="_blank">GitHub</a>
    <a href="https://github.com/jaytheham/body-harvest-decompilation/blob/master/CONTRIBUTING.md" target="_blank">Contribute</a>
  </div>
</header>

<div class="container">
  <div id="app"><div class="loading">Loading progress data...</div></div>
</div>

<footer id="footer"></footer>

<script>
const DATA_URL = 'progress.json';

function pct(n, t) { return t ? (n / t * 100) : 0; }
function fmt(n) { return n.toFixed(1) + '%'; }
function fmt2(n) { return n.toFixed(2) + '%'; }

async function load() {
  let data;
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    data = await r.json();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error">Failed to load progress.json: ${e.message}</div>`;
    return;
  }
  render(data);
}

function render(d) {
  const o = d.overall;
  const app = document.getElementById('app');

  // --- Hero ---
  const heroHTML = `
    <div class="hero">
      <div class="stat-card matched">
        <div class="label">Matched</div>
        <div class="value">${fmt2(o.matched_pct)}</div>
        <div class="sub">${o.matched.toLocaleString()} / ${o.total_functions.toLocaleString()} functions</div>
      </div>
      <div class="stat-card decomp">
        <div class="label">Decompiled</div>
        <div class="value">${fmt2(o.decompiled_pct)}</div>
        <div class="sub">${(o.matched + o.non_matching).toLocaleString()} functions have C source</div>
      </div>
      <div class="stat-card">
        <div class="label">Non-Matching</div>
        <div class="value">${o.non_matching.toLocaleString()}</div>
        <div class="sub">Decompiled but not byte-perfect</div>
      </div>
      <div class="stat-card">
        <div class="label">ASM Stubs</div>
        <div class="value">${o.asm_stubs.toLocaleString()}</div>
        <div class="sub">Still in assembly</div>
      </div>
    </div>`;

  // --- Overall progress bar ---
  const matchedW = pct(o.matched, o.total_functions);
  const nonmatchW = pct(o.non_matching, o.total_functions);
  const progressHTML = `
    <div class="progress-section">
      <h2>Overall Progress</h2>
      <div class="progress-bar">
        <div class="bar-matched" style="width:${matchedW}%"></div>
        <div class="bar-nonmatch" style="width:${nonmatchW}%"></div>
      </div>
      <div class="legend">
        <span><span class="legend-dot" style="background:var(--matched-light)"></span>Matched ${fmt2(o.matched_pct)}</span>
        <span><span class="legend-dot" style="background:var(--nonmatch-light)"></span>Non-Matching ${fmt2(pct(o.non_matching, o.total_functions))}</span>
        <span><span class="legend-dot" style="background:var(--asm)"></span>ASM ${fmt2(pct(o.asm_stubs, o.total_functions))}</span>
      </div>
    </div>`;

  // --- Segments panel ---
  const segsHTML = Object.entries(d.segments).map(([, seg]) => {
    const mw = pct(seg.matched, seg.total);
    const nw = pct(seg.non_matching, seg.total);
    return `
      <div class="seg-row">
        <div class="seg-header">
          <span class="seg-name">${seg.display_name}</span>
          <span class="seg-pct">${fmt(seg.matched_pct)} matched &middot; ${seg.matched}/${seg.total}</span>
        </div>
        <div class="seg-bar">
          <div class="bar-matched" style="width:${mw}%"></div>
          <div class="bar-nonmatch" style="width:${nw}%"></div>
        </div>
      </div>`;
  }).join('');

  const segmentsHTML = `
    <div class="panel">
      <h2>By Segment</h2>
      ${segsHTML}
    </div>`;

  // --- History chart ---
  const chartHTML = `
    <div class="panel">
      <h2>Progress Over Time</h2>
      <div class="chart-wrap"><canvas id="historyChart"></canvas></div>
    </div>`;

  // --- Grid ---
  const grid2HTML = `<div class="grid-2">${chartHTML}${segmentsHTML}</div>`;

  // --- Files table ---
  const filesHTML = `
    <div class="table-section">
      <h2>Files</h2>
      <div class="table-controls">
        <input type="text" id="fileSearch" placeholder="Search files..." style="width:200px">
        <select id="segFilter"><option value="">All segments</option>${
          [...new Set(d.files.map(f => f.segment))].sort().map(s =>
            `<option value="${s}">${s}</option>`).join('')
        }</select>
        <select id="sortCol">
          <option value="path">Sort: Name</option>
          <option value="matched_pct" selected>Sort: Matched %</option>
          <option value="matched">Sort: Matched count</option>
          <option value="total">Sort: Total functions</option>
          <option value="asm_stubs">Sort: ASM remaining</option>
        </select>
      </div>
      <div class="table-wrap">
        <table id="filesTable">
          <thead>
            <tr>
              <th>File</th>
              <th>Segment</th>
              <th>Matched</th>
              <th>Non-Match</th>
              <th>ASM</th>
              <th>Total</th>
              <th>Progress</th>
              <th>Contributor</th>
            </tr>
          </thead>
          <tbody id="filesBody"></tbody>
        </table>
      </div>
    </div>`;

  // --- Contributors ---
  const contribHTML = d.contributors.length ? `
    <div class="contrib-grid">
      ${d.contributors.map(c => `
        <div class="contrib-card">
          <div class="contrib-name">${c.name}</div>
          <div class="contrib-stat">Files touched: <span>${c.files}</span></div>
          <div class="contrib-stat">Matched functions: <span>${c.matched}</span></div>
          <div class="contrib-stat">Non-matching: <span>${c.non_matching}</span></div>
          <div class="contrib-stat">ASM remaining: <span>${c.asm_stubs}</span></div>
        </div>`).join('')}
    </div>` : '';

  app.innerHTML = heroHTML + progressHTML + grid2HTML + filesHTML + contribHTML;

  // --- Populate files table ---
  let filesData = [...d.files];
  let sortDir = -1;
  let sortKey = 'matched_pct';

  function renderTable() {
    const search = document.getElementById('fileSearch').value.toLowerCase();
    const segF = document.getElementById('segFilter').value;
    sortKey = document.getElementById('sortCol').value;

    let rows = filesData.filter(f =>
      (!search || f.path.toLowerCase().includes(search) || (f.contributor || '').toLowerCase().includes(search)) &&
      (!segF || f.segment === segF)
    );
    rows.sort((a, b) => {
      const av = a[sortKey] ?? 0, bv = b[sortKey] ?? 0;
      if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
      return (bv - av) * sortDir;
    });

    document.getElementById('filesBody').innerHTML = rows.map(f => {
      const mw = pct(f.matched, f.total);
      const nw = pct(f.non_matching, f.total);
      return `<tr>
        <td><code>${f.path}</code></td>
        <td><span style="color:var(--text-muted)">${f.segment}</span></td>
        <td>${f.matched} <span class="badge badge-matched">${fmt(f.matched_pct)}</span></td>
        <td>${f.non_matching}</td>
        <td>${f.asm_stubs}</td>
        <td>${f.total}</td>
        <td>
          <div class="mini-bar">
            <div class="bar-matched" style="width:${mw}%"></div>
            <div class="bar-nonmatch" style="width:${nw}%"></div>
          </div>
        </td>
        <td>${f.contributor || '<span style="color:var(--text-muted)">—</span>'}</td>
      </tr>`;
    }).join('');
  }

  renderTable();
  document.getElementById('fileSearch').addEventListener('input', renderTable);
  document.getElementById('segFilter').addEventListener('change', renderTable);
  document.getElementById('sortCol').addEventListener('change', renderTable);

  // --- History chart ---
  if (d.history && d.history.length > 0) {
    const ctx = document.getElementById('historyChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: d.history.map(h => h.date),
        datasets: [
          {
            label: 'Matched %',
            data: d.history.map(h => h.matched_pct),
            borderColor: '#2ea043',
            backgroundColor: 'rgba(46,160,67,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 3,
          },
          {
            label: 'Decompiled %',
            data: d.history.map(h => h.decompiled_pct),
            borderColor: '#d29922',
            backgroundColor: 'rgba(210,153,34,0.05)',
            fill: false,
            tension: 0.3,
            pointRadius: 3,
            borderDash: [4, 3],
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#8b949e', boxWidth: 12 } },
          tooltip: {
            backgroundColor: '#161b22',
            borderColor: '#30363d',
            borderWidth: 1,
            titleColor: '#e6edf3',
            bodyColor: '#8b949e',
          },
        },
        scales: {
          x: {
            ticks: { color: '#8b949e', maxTicksLimit: 8 },
            grid: { color: 'rgba(48,54,61,0.5)' },
          },
          y: {
            min: 0,
            max: 100,
            ticks: { color: '#8b949e', callback: v => v + '%' },
            grid: { color: 'rgba(48,54,61,0.5)' },
          },
        },
      },
    });
  }

  // --- Footer ---
  const updated = d.generated ? new Date(d.generated).toLocaleString() : 'unknown';
  document.getElementById('footer').textContent =
    `Updated ${updated} · Commit ${d.commit || 'unknown'} · ${o.total_functions.toLocaleString()} total functions tracked`;
}

load();
</script>
</body>
</html>
