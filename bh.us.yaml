options:
  platform: n64
  basename: bh
  target_path: baserom.us.z64
  base_path: .
  disassemble_all: yes
  matchings_path: matchings
  symbol_addrs_path: symbol_addrs.us.txt
  reloc_addrs_path: reloc_addrs.us.txt
  ld_symbol_header_path: include/ld_symbols.us.h
  generated_c_preamble: |
    #include <ultra64.h>
    #include "common.h"
  src_path: src.us
  extensions_path: tools/splat_ext
  lib_path: build/lib
  migrate_rodata_to_functions: no
  # workaround regex issue
  create_undefined_funcs_auto: no
  symbol_name_format: $VRAM_$ROM
  asm_jtbl_label_macro: jlabel
  asm_data_macro: dlabel
  image_type_in_extension: yes
  segment_symbols_style: makerom
segments:
  - name: header
    type: header
    start: 0x0

  - name: boot
    type: bin
    start: 0x40

