name: build

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        version: [us]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch ROM from private assets repo
        env:
          ROM_PAT: ${{ secrets.BH_ROM_ASSETS_PAT }}
        run: |
          if [ -n "$ROM_PAT" ]; then
            git clone --depth 1 "https://x-access-token:${ROM_PAT}@github.com/Meridian-Lex/bh-rom-assets.git" rom-assets
            cp rom-assets/baserom.${{ matrix.version }}.z64 baserom.${{ matrix.version }}.z64
            echo "ROM_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "::warning::BH_ROM_ASSETS_PAT not set — skipping ROM fetch and build verification"
            echo "ROM_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $(cat packages.txt | tr '\n' ' ')

      - name: Install Python dependencies
        run: pip3 install -r requirements.txt

      - name: Extract ROM
        if: env.ROM_AVAILABLE == 'true'
        run: make extract VERSION=${{ matrix.version }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-${{ matrix.version }}-${{ hashFiles('src.us/**', 'asm/**', 'assets/**', 'Makefile') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.version }}-

      - name: Build and verify ROM
        if: env.ROM_AVAILABLE == 'true'
        run: make --jobs VERSION=${{ matrix.version }}

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-${{ matrix.version }}
          path: |
            build/bh.${{ matrix.version }}.map
            build/undefined_syms.txt
