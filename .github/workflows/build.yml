name: build

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        version: [us, eu]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $(cat packages.txt | tr '\n' ' ')

      - name: Install Python dependencies
        run: pip3 install -r requirements.txt

      - name: Place ROM
        env:
          ROM_US: ${{ secrets.BASEROM_US }}
          ROM_EU: ${{ secrets.BASEROM_EU }}
        run: |
          if [ "${{ matrix.version }}" = "us" ]; then
            echo "$ROM_US" | base64 -d > baserom.us.z64
          else
            echo "$ROM_EU" | base64 -d > baserom.eu.z64
          fi

      - name: Extract ROM
        run: make extract VERSION=${{ matrix.version }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-${{ matrix.version }}-${{ hashFiles('src.us/**', 'asm/**', 'assets/**', 'Makefile') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.version }}-

      - name: Build ROM
        run: make --jobs VERSION=${{ matrix.version }}

      - name: Upload build on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-${{ matrix.version }}
          path: |
            build/bh.${{ matrix.version }}.map
            build/undefined_syms.txt
