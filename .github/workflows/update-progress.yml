name: Update Progress

on:
  push:
    branches:
      - master
    paths:
      - 'src.us/**/*.c'

jobs:
  update:
    name: Regenerate progress.json
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: python3 -m pip install --quiet pyyaml

      - name: Count progress
        run: python3 tools/count_progress.py

      - name: Commit updated progress.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.json
          if git diff --cached --quiet; then
            echo "No change in progress.json — skipping commit"
          else
            git commit -m "progress: update match counts [skip ci]"
            git push
          fi
