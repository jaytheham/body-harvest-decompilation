name: Build Check

on:
  pull_request:
    paths:
      - 'src.us/**/*.c'
      - 'include/**/*.h'

jobs:
  build:
    name: Compile changed zone files
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential gcc-mips-linux-gnu python3 python3-pip
          python3 -m pip install --quiet -r requirements.txt

      - name: Build IDO tools
        run: make tools

      - name: Find changed C source files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          FILES=$(git diff --name-only "$BASE" "$HEAD" -- 'src.us/**/*.c' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed source files: $FILES"

      - name: Compile changed files (NON_MATCHING=1)
        if: steps.changed.outputs.files != ''
        run: |
          FAILED=0
          for src in ${{ steps.changed.outputs.files }}; do
            obj="build/${src}.o"
            echo "--- Compiling: $src"
            if ! make "$obj" NON_MATCHING=1 2>&1; then
              echo "::error file=$src::Compilation failed"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: No source changes
        if: steps.changed.outputs.files == ''
        run: echo "No .c files changed — header-only change. Build check skipped."
