name: Build Check

on:
  pull_request:
    paths:
      - 'src.us/**/*.c'
      - 'include/**/*.h'

jobs:
  build:
    name: Compile changed zone files
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential gcc-mips-linux-gnu python3 python3-pip
          python3 -m pip install --quiet -r requirements.txt

      - name: Restore IDO tool permissions
        run: chmod +x tools/ido5.3_recomp/*

      - name: Build IDO tools and create build directories
        run: |
          make tools
          make dirs

      - name: Find changed C source files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          FILES=$(git diff --name-only "$BASE" "$HEAD" -- 'src.us/**/*.c' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed source files: $FILES"

      - name: Compile changed files (NON_MATCHING=1 PERMUTER=1)
        if: steps.changed.outputs.files != ''
        run: |
          # NON_MATCHING=1  — compile C bodies instead of inlining ROM ASM
          # PERMUTER=1      — skip asm-processor for GLOBAL_ASM zones (avoids failures
          #                   on stubborn functions whose .s stubs are not asm-processor
          #                   format). C syntax is still fully checked by IDO.
          FAILED=0
          for src in ${{ steps.changed.outputs.files }}; do
            obj="build/${src}.o"
            echo "--- Compiling: $src"
            if ! make "$obj" NON_MATCHING=1 PERMUTER=1 2>&1; then
              echo "::error file=$src::Compilation failed"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: ROM-free diff check (NON_MATCHING zones only)
        if: steps.changed.outputs.files != ''
        run: |
          # For NON_MATCHING zones (e.g. greece, java), compiled C bodies appear as
          # symbols in the .o — compare them against the committed .s stubs in
          # asm/nonmatchings/ to catch functions that compile but are not byte-identical.
          #
          # GLOBAL_ASM zones (comet, siberia, america) produce no compiled symbols under
          # PERMUTER=1 and are silently skipped — they require the full ROM build for
          # diff validation (see full-build.yml when available).
          python3 tools/ci_diff_check.py ${{ steps.changed.outputs.files }}

      - name: No source changes
        if: steps.changed.outputs.files == ''
        run: echo "No .c files changed — header-only change. Build check skipped."
